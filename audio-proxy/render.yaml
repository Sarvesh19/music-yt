services:
  - type: web
    name: melodix-audio-proxy
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: AUDIO_PROXY_KEY
        generateValue: true
      - key: YT_COOKIES
        sync: false
